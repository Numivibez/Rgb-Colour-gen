<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Colour</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>RGB Colour Generator</h1>
        <div class="color-box" id="color-box"></div>
        <div class="sliders">
            <div class="slider">
                <label for="redSlider">Red:</label>
                <input type="range" id="redSlider" name="red" min="0" max="255" value="0">
                <span id="redValue">0</span>
            </div>

            <div class="slider">
                <label for="greenSlider">Green:</label>
                <input type="range" id="greenSlider" name="green" min="0" max="255" value="0">
                <span id="greenValue">0</span>
            </div>
            
            <div class="slider">
                <label for="blueSlider">Blue:</label>
                <input type="range" id="blueSlider" name="blue" min="0" max="255" value="0">
                <span id="blueValue">0</span>
            </div>
        </div>

        <div class="button-container">
            <button id="copyButton">Copy RGB Value</button>
            <!-- <button id="resetButton">Reset</button> -->
            <div id="inputType" class="input-type-value">RGB(255,128,155)</div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
